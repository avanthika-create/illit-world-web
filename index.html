<!DOCTYPE html>
<html lang="en"> 
    <head> 
        <meta charset="UTF-8">
        <title>Illit World</title>
           <link rel="stylesheet" href="style.css">
    </head>
    <body>
    <div class="computer">
    <img class="computer-frame" src="images/illitcomputer.png">

    <img class="screen-image" src="images/illitgroup.png">
    <div class="button">
        <img src="images/illitworldbutton.png" alt="illit world button">
    </div>
    
    <div id="desktop"> 

    <div class="icon" onclick="openMember('yunah')">
        <img src="images/folderpicture.png">
        <p>Yunah</p>
    </div>

  <div class="icon" onclick="openMember('minju')">
        <img src="images/folderpicture.png">
        <p>Minju</p>
    </div>

      <div class="icon" onclick="openMember('moka')">
        <img src="images/folderpicture.png">
        <p>Moka</p>
    </div>

     <div class="icon" onclick="openMember('wonhee')">
        <img src="images/folderpicture.png">
        <p>Wonhee</p>
    </div>

    <div class="icon" onclick="openMember('iroha')">
        <img src="images/folderpicture.png">
        <p>Iroha</p>
    </div>

    <div class="icon" onclick="openTrash()">
        <img src="images/trashpicture.png">
        <p>Recycle Bin</p>
    </div>
    </div>

    <div id="viewer" class="hidden">
        <div id="viewer-header">
            drag me
        <span id="window-title"></span>
        <div id="close" onclick="closeViewer()">✕</div>
        </div>

        <div id="viewer-content"></div>
        <div id="close" onclick="closeViewer()">✕</div>
   </div>


   <audio id="clickSound" src="images/clicksound.mp3"></audio>

   <audio id="dragSound" src="images/dragsound.mp3"></audio>


   <script src="script.js"></script>
</body>
</html>
